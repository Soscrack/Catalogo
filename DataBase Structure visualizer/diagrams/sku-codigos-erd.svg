  <text class="rel-label" x="482" y="382">mapea</text>
  <path class="rel" d="M460 314 L620 260"/>
  <text class="rel-label" x="500" y="278">identidad</text>
  <path class="rel" d="M460 550 L460 314"/>
  <text class="rel-label" x="468" y="440">sku local</text>
  <path class="rel" d="M580 550 L620 314"/>
  <text class="rel-label" x="590" y="430">sync POS</text>
  <path class="rel" d="M800 430 L880 360"/>
  <text class="rel-label" x="820" y="390">indexado</text>
  <path class="rel" d="M250 440 L340 520"/>
