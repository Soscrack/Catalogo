  <rect x="40" y="620" width="1160" height="120" rx="10" fill="#152030" stroke="#2d3f56"/>
  <text fill="#fbbf24" font-size="12" font-weight="600" x="60" y="648">Codigos de barra</text>
  <text fill="#8b9cb3" font-size="11" x="60" y="668">CSV Mamut (CodigosBarra/) es fuente operativa del buscador. riverso_barcodes es tabla POS en WordPress.</text>
  <text fill="#8b9cb3" font-size="11" x="60" y="686">Un SKU local puede tener varios codigos de barra. UK barcode en riverso_barcodes evita duplicados en POS.</text>
  <text fill="#5eead4" font-size="11" x="60" y="708">Buscador: coincidencia exacta primero por SKU, codigo proveedor o codigo de barras EAN</text>
</svg>
