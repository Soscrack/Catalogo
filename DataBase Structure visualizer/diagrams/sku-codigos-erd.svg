  <text class="col" x="352" y="412">valor: sku_local</text>
  <text class="col" x="352" y="428">ej. 04RLHB - 445</text>

  <rect class="hdr" x="340" y="480" width="240" height="26" rx="6"/>
  <text class="title" x="352" y="498">codigos_barras_*.csv</text>
