<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5eead4"/>
    </marker>
    <style>
      .tbl { fill:#1a2332; stroke:#7c9cff; stroke-width:1.5; }
      .hdr { fill:#243044; stroke:#7c9cff; stroke-width:1.5; }
      .title { fill:#e8edf4; font-size:13px; font-weight:600; }
      .col { fill:#8b9cb3; font-size:11px; }
      .pk { fill:#5eead4; font-size:10px; font-weight:600; }
      .rel { stroke:#5eead4; stroke-width:1.2; fill:none; marker-end:url(#arrow); }
      .rel-label { fill:#5eead4; font-size:10px; }
    </style>
  </defs>
  <text x="20" y="28" fill="#e8edf4" font-size="18" font-weight="600">WooCommerce  Entidad-Relacion (productos)</text>

  <!-- wp_posts -->
  <rect class="hdr" x="40" y="60" width="200" height="28" rx="6"/>
  <text class="title" x="52" y="79">wp_posts</text>
  <rect class="tbl" x="40" y="88" width="200" height="108" rx="6"/>
  <text class="pk" x="52" y="108">PK ID</text>
  <text class="col" x="52" y="124">FK post_parent</text>
  <text class="col" x="52" y="140">post_type</text>
  <text class="col" x="52" y="156">post_status</text>
  <text class="col" x="52" y="172">post_title</text>
  <text class="col" x="52" y="188">product | variation</text>

  <!-- wp_postmeta -->
  <rect class="hdr" x="40" y="240" width="200" height="28" rx="6"/>
  <text class="title" x="52" y="259">wp_postmeta</text>
  <rect class="tbl" x="40" y="268" width="200" height="88" rx="6"/>
  <text class="pk" x="52" y="288">PK meta_id</text>
  <text class="col" x="52" y="304">FK post_id</text>
  <text class="col" x="52" y="320">meta_key (_sku...)</text>
  <text class="col" x="52" y="336">meta_value</text>

  <!-- wp_terms -->
  <rect class="hdr" x="320" y="60" width="200" height="28" rx="6"/>
  <text class="title" x="332" y="79">wp_terms</text>
  <rect class="tbl" x="320" y="88" width="200" height="72" rx="6"/>
  <text class="pk" x="332" y="108">PK term_id</text>
  <text class="col" x="332" y="124">name</text>
  <text class="col" x="332" y="140">slug</text>

  <!-- wp_term_taxonomy -->
  <rect class="hdr" x="320" y="200" width="220" height="28" rx="6"/>
  <text class="title" x="332" y="219">wp_term_taxonomy</text>
  <rect class="tbl" x="320" y="228" width="220" height="88" rx="6"/>
  <text class="pk" x="332" y="248">PK term_taxonomy_id</text>
  <text class="col" x="332" y="264">FK term_id</text>
  <text class="col" x="332" y="280">taxonomy product_cat</text>
  <text class="col" x="332" y="296">FK parent</text>

  <!-- wp_term_relationships -->
  <rect class="hdr" x="320" y="360" width="240" height="28" rx="6"/>
  <text class="title" x="332" y="379">wp_term_relationships</text>
  <rect class="tbl" x="320" y="388" width="240" height="72" rx="6"/>
  <text class="pk" x="332" y="408">PK object_id (producto)</text>
  <text class="col" x="332" y="424">PK term_taxonomy_id</text>
  <text class="col" x="332" y="440">term_order</text>

  <!-- wc_product_meta_lookup -->
  <rect class="hdr" x="620" y="60" width="260" height="28" rx="6"/>
  <text class="title" x="632" y="79">wc_product_meta_lookup</text>
  <rect class="tbl" x="620" y="88" width="260" height="104" rx="6"/>
  <text class="pk" x="632" y="108">PK FK product_id</text>
  <text class="col" x="632" y="124">UK sku</text>
  <text class="col" x="632" y="140">min_price / max_price</text>
  <text class="col" x="632" y="156">stock_status</text>
  <text class="col" x="632" y="172">stock_quantity</text>

  <!-- wc_product_attributes_lookup -->
  <rect class="hdr" x="620" y="240" width="280" height="28" rx="6"/>
  <text class="title" x="632" y="259">wc_product_attributes_lookup</text>
  <rect class="tbl" x="620" y="268" width="280" height="104" rx="6"/>
  <text class="pk" x="632" y="288">PK product_id</text>
  <text class="col" x="632" y="304">product_or_parent_id</text>
  <text class="col" x="632" y="320">attribute_name / value</text>
  <text class="col" x="632" y="336">is_variation_attribute</text>

  <!-- wp_termmeta -->
  <rect class="hdr" x="620" y="420" width="200" height="28" rx="6"/>
  <text class="title" x="632" y="439">wp_termmeta</text>
  <rect class="tbl" x="620" y="448" width="200" height="72" rx="6"/>
  <text class="pk" x="632" y="468">PK meta_id</text>
  <text class="col" x="632" y="484">FK term_id</text>
  <text class="col" x="632" y="500">meta_key / value</text>

  <!-- Relations -->
  <path class="rel" d="M140 196 L140 240"/>
  <text class="rel-label" x="148" y="222">1:N metadatos</text>

  <path class="rel" d="M240 130 Q280 130 280 180 T320 130"/>
  <text class="rel-label" x="248" y="118">variaciones</text>

  <path class="rel" d="M420 160 L420 200"/>
  <text class="rel-label" x="428" y="185">define</text>

  <path class="rel" d="M420 316 L420 360"/>
  <text class="rel-label" x="428" y="342">asigna</text>

  <path class="rel" d="M240 424 L310 424"/>
  <text class="rel-label" x="248" y="414">clasificado</text>

  <path class="rel" d="M520 140 L620 140"/>
  <text class="rel-label" x="540" y="130">indexado</text>

  <path class="rel" d="M520 310 L620 310"/>
  <text class="rel-label" x="528" y="300">atributos idx</text>

  <path class="rel" d="M520 100 L600 480 L620 484"/>
  <text class="rel-label" x="548" y="460">termino attr</text>

  <path class="rel" d="M520 96 L610 96"/>
  <text class="rel-label" x="530" y="86">terminos meta</text>

  <rect x="40" y="560" width="1120" height="130" rx="10" fill="#152030" stroke="#2d3f56"/>
  <text fill="#8b9cb3" font-size="12" x="60" y="588">Producto simple/variable: post_type=product · Variacion: post_type=product_variation, post_parent=ID padre</text>
  <text fill="#8b9cb3" font-size="12" x="60" y="610">SKU online en wp_postmeta._sku y wc_product_meta_lookup.sku · Lookup tables son indices, no fuente de verdad</text>
  <text fill="#5eead4" font-size="12" x="60" y="640">API: WC_Product_Simple | WC_Product_Variable | WC_Product_Variation | wc_get_product()</text>
</svg>
